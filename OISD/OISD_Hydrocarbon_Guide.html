<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OISD Standards – Hydrocarbon Refinery Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #07080d;
    --surface: #0d1117;
    --surface2: #111827;
    --border: #1e3054;
    --text: #e2e8f4;
    --muted: #6b7fa3;
    --accent: #FF6B35;
    --gold: #FFD60A;
    --blue: #3A86FF;
    --green: #06D6A0;
    --red: #E63946;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #07080d 0%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 36px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(255,107,53,.1) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 50%, rgba(58,134,255,.08) 0%, transparent 55%);
  }
  .tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(26px,5vw,50px); font-weight: 900; background: linear-gradient(90deg, #FF6B35 0%, #FFD60A 50%, #3A86FF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
  .subtitle { color: var(--muted); margin-top: 8px; font-size: 14px; }

  /* NAV TABS */
  .nav { display: flex; justify-content: center; gap: 10px; padding: 20px 24px 0; flex-wrap: wrap; }
  .nav-btn { padding: 9px 20px; border-radius: 40px; border: 2px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-weight: 600; font-size: 13px; transition: all .2s; font-family: 'Inter', sans-serif; }
  .nav-btn.active { border-color: var(--accent); background: rgba(255,107,53,.15); color: var(--accent); }
  .nav-btn:hover { border-color: #2a4070; color: var(--text); }

  /* FILTER BAR */
  .filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 16px 24px 0; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; font-weight: 600; transition: all .2s; font-family: 'Inter', sans-serif; }
  .filter-btn.active { opacity: 1; }

  /* SECTIONS */
  .section { display: none; max-width: 1200px; margin: 0 auto; padding: 24px; }
  .section.visible { display: block; }

  /* CARDS GRID */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 18px; }
  .card {
    background: linear-gradient(135deg, var(--surface), var(--surface2));
    border-radius: 16px; padding: 20px; cursor: pointer;
    transition: all .25s; border: 1.5px solid transparent; position: relative; overflow: hidden;
  }
  .card::before { content: ''; position: absolute; top: 0; right: 0; width: 80px; height: 80px; border-radius: 0 16px 0 80px; opacity: .15; }
  .card:hover { transform: translateY(-4px); }
  .card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .card-icon { font-size: 28px; }
  .card-id { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; display: inline-block; margin-bottom: 3px; }
  .card-cat { font-size: 10px; color: var(--muted); }
  .card-badge { margin-left: auto; font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
  .card-title { font-weight: 700; font-size: 14px; margin-bottom: 8px; line-height: 1.4; }
  .card-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .card-hc { margin-top: 12px; font-size: 11px; font-weight: 600; }

  /* DETAIL PANEL */
  #detail-panel { display: none; }
  .back-btn { background: none; border: 1.5px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-bottom: 20px; font-family: 'Inter', sans-serif; transition: all .2s; }
  .back-btn:hover { color: var(--text); border-color: #2a4070; }
  .detail-card { border-radius: 20px; padding: 32px; }
  .detail-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .detail-icon { font-size: 52px; }
  .detail-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .detail-cat { font-size: 13px; color: var(--muted); }
  .detail-desc { border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; line-height: 1.7; font-size: 14px; }
  .detail-section-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .kp-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .kp-item { display: flex; gap: 12px; align-items: flex-start; background: rgba(255,255,255,.04); border-radius: 8px; padding: 10px 14px; }
  .kp-num { font-weight: 700; min-width: 20px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; }
  .kp-text { font-size: 13px; line-height: 1.6; color: #c8d4e8; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .detail-box { background: rgba(255,255,255,.04); border-radius: 12px; padding: 16px; }
  .detail-box-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-family: 'IBM Plex Mono', monospace; }
  .detail-box-val { font-size: 13px; line-height: 1.6; }
  .mnemonic-box { background: linear-gradient(90deg, #1a1a2e, #0f1420); border: 1px solid #2a3a5e; border-radius: 12px; padding: 16px 20px; }
  .mnemonic-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-family: 'IBM Plex Mono', monospace; }
  .mnemonic-text { font-size: 14px; color: var(--gold); font-weight: 600; font-style: italic; }

  /* MINDMAP */
  .mindmap-category { margin-bottom: 30px; }
  .mindmap-cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .mindmap-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .mindmap-cat-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; }
  .mindmap-line { flex: 1; height: 1px; }
  .mindmap-items { display: flex; flex-wrap: wrap; gap: 12px; padding-left: 26px; }
  .mindmap-item { border-radius: 12px; padding: 12px 16px; cursor: pointer; transition: all .2s; min-width: 200px; border: 1.5px solid transparent; }
  .mindmap-item:hover { transform: scale(1.04); }
  .mindmap-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .mindmap-item-id { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 13px; }
  .mindmap-item-title { font-size: 12px; color: #c8d4e8; line-height: 1.4; }
  .mindmap-item-hc { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* FLASHCARDS */
  .flashcards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
  .flashcard-wrapper { height: 170px; cursor: pointer; perspective: 1000px; }
  .flashcard-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .5s; }
  .flashcard-wrapper.flipped .flashcard-inner { transform: rotateY(180deg); }
  .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 14px; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .flashcard-back { transform: rotateY(180deg); align-items: flex-start; text-align: left; justify-content: flex-start; padding: 16px; }
  .fc-icon { font-size: 34px; margin-bottom: 8px; }
  .fc-id { font-family: 'IBM Plex Mono', monospace; font-weight: 900; font-size: 20px; }
  .fc-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .fc-title { font-weight: 800; font-size: 13px; margin-bottom: 8px; }
  .fc-desc { font-size: 11px; color: #c8d4e8; line-height: 1.5; margin-bottom: 8px; }
  .fc-mnemonic { font-size: 10px; font-style: italic; }

  /* QUIZ */
  .quiz-wrap { max-width: 680px; margin: 0 auto; }
  .quiz-card { background: var(--surface); border: 2px solid var(--border); border-radius: 20px; padding: 32px; }
  .quiz-meta { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 13px; }
  .quiz-q { background: rgba(255,255,255,.05); border-radius: 12px; padding: 20px; margin-bottom: 24px; font-size: 15px; line-height: 1.7; color: #c8d4e8; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt { border-radius: 12px; padding: 14px 20px; font-weight: 700; font-size: 14px; cursor: pointer; text-align: left; transition: all .2s; font-family: 'Inter', sans-serif; border: 2px solid var(--border); background: rgba(255,255,255,.04); color: #c8d4e8; }
  .quiz-opt:hover:not(:disabled) { border-color: #3a86ff; background: rgba(58,134,255,.1); }
  .quiz-opt.correct { border-color: var(--green) !important; background: rgba(6,214,160,.15) !important; color: var(--green) !important; }
  .quiz-opt.wrong { border-color: var(--red) !important; background: rgba(230,57,70,.15) !important; color: var(--red) !important; }
  .quiz-next { background: linear-gradient(90deg, var(--accent), #e05a2a); border: none; color: #fff; padding: 14px 32px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 14px; margin-top: 20px; width: 100%; font-family: 'Inter', sans-serif; display: none; }
  .quiz-result { text-align: center; padding: 48px 32px; }
  .quiz-result-icon { font-size: 64px; margin-bottom: 16px; }
  .quiz-result-title { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 900; color: var(--gold); margin-bottom: 12px; }
  .quiz-result-score { font-size: 18px; color: #c8d4e8; margin-bottom: 8px; }
  .quiz-result-msg { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .quiz-retry { background: linear-gradient(90deg, var(--accent), var(--red)); border: none; color: #fff; padding: 14px 32px; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 15px; font-family: 'Inter', sans-serif; }

  /* STATS */
  .stats-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; max-width: 700px; margin: 40px auto 0; padding: 0 24px 40px; }
  .stat-box { border-radius: 12px; padding: 16px; text-align: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 900; }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  @media (max-width: 600px) {
    .detail-grid { grid-template-columns: 1fr; }
    .stats-bar { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="tag">🛢️ Refinery Knowledge System</div>
  <h1>OISD Standards for Hydrocarbons</h1>
  <p class="subtitle">Oil Industry Safety Directorate · Interactive Visual Learning Guide</p>
</header>

<div class="nav">
  <button class="nav-btn active" onclick="showView('cards')">📦 Cards</button>
  <button class="nav-btn" onclick="showView('mindmap')">🧠 Mind Map</button>
  <button class="nav-btn" onclick="showView('flashcard')">🃏 Flashcards</button>
  <button class="nav-btn" onclick="showView('quiz')">🎯 Quiz</button>
</div>

<!-- CARDS VIEW -->
<div class="section visible" id="view-cards">
  <div class="filters" id="filter-bar"></div>
  <div id="detail-panel">
    <button class="back-btn" onclick="closeDetail()">← Back to all standards</button>
    <div id="detail-content"></div>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
</div>

<!-- MINDMAP VIEW -->
<div class="section" id="view-mindmap">
  <div style="text-align:center;margin-bottom:20px">
    <h2 style="color:var(--gold);font-family:'Syne',sans-serif;font-size:20px">OISD Category Mind Map</h2>
    <p style="color:var(--muted);font-size:13px;margin-top:6px">Click any standard for full details</p>
  </div>
  <div id="mindmap-content"></div>
</div>

<!-- FLASHCARDS VIEW -->
<div class="section" id="view-flashcard">
  <div class="filters" id="filter-bar-fc"></div>
  <div style="text-align:center;padding:12px 0 16px;color:var(--muted);font-size:13px">Click any card to flip and reveal details</div>
  <div class="flashcards-grid" id="flashcards-grid"></div>
</div>

<!-- QUIZ VIEW -->
<div class="section" id="view-quiz">
  <div class="quiz-wrap">
    <div class="quiz-card" id="quiz-container"></div>
  </div>
</div>

<!-- STATS -->
<div class="stats-bar" id="stats-bar"></div>

<script>
const OISDS = [
  { id:"OISD-118", title:"Layout of Oil & Gas Installations", category:"Layout & Spacing", color:"#FF6B35", icon:"🏭", severity:"Critical",
    description:"Defines minimum safe distances between equipment, tanks, and process units in a refinery.",
    keyPoints:["Minimum distance between fired heaters & process units: 15m","Tank-to-tank spacing based on diameter (D/4 for fixed roof tanks)","Control room: minimum 30m from process units","Flare stack: minimum 90m from all process units","Cooling towers: 30m from any fired equipment"],
    application:"Designing new refinery layouts or modifying existing ones",
    hydrocarbon:"All hydrocarbons — crude, naphtha, LPG, fuel oil, ATF",
    mnemonic:"LAYOUT = L-ocation A-ssessment Y-ields O-ptimal U-nit T-olerance" },
  { id:"OISD-116", title:"Fire Protection for Petroleum Depots", category:"Fire Protection", color:"#E63946", icon:"🔥", severity:"Critical",
    description:"Prescribes fire protection systems for petroleum product storage and handling facilities.",
    keyPoints:["Fixed foam systems mandatory for Class A & B petroleum tanks","Hydrant spacing: maximum 45m apart","Water spray systems for LPG spheres & bullets","Fire water storage: minimum 4 hours supply","Foam application rate: 6.5 L/min/m² for cone roof tanks"],
    application:"Petroleum storage depots, tank farms, loading/unloading facilities",
    hydrocarbon:"Petroleum products — MS, HSD, SKO, ATF, LDO, FO",
    mnemonic:"FIRE = F-oam I-nstallation R-equires E-ffective planning" },
  { id:"OISD-117", title:"Fire Protection for LPG Installations", category:"Fire Protection", color:"#F4A261", icon:"💨", severity:"Critical",
    description:"Covers fire protection requirements specifically for LPG storage, handling, and distribution.",
    keyPoints:["Water spray on LPG vessels: 10.2 L/min/m² for spheres","Safety valve discharge routed to flare or safe location","Gas detectors mandatory at low points & near equipment","Dyke walls required for LPG bullet batteries","Emergency shutdown valves within 15m of vessels"],
    application:"LPG bottling plants, storage terminals, pipeline installations",
    hydrocarbon:"LPG — Propane (C3), Butane (C4) and mixtures",
    mnemonic:"LPG = L-eakage P-revention G-uaranteed by OISD-117" },
  { id:"OISD-113", title:"Classification of Areas for Electrical Installations", category:"Hazardous Area", color:"#FFD60A", icon:"⚡", severity:"High",
    description:"Classifies hazardous areas in oil & gas facilities for safe electrical equipment installation.",
    keyPoints:["Zone 0: Explosive atmosphere present continuously (>1000 hrs/year)","Zone 1: Explosive atmosphere likely in normal operation (10–1000 hrs/year)","Zone 2: Explosive atmosphere unlikely but possible (<10 hrs/year)","Equipment selection by gas group: IIA, IIB, IIC","Temperature classification: T1 (450°C) to T6 (85°C)"],
    application:"All refinery process areas, storage tanks, loading bays",
    hydrocarbon:"All flammable vapors — H₂ (IIC), Ethylene (IIB), Propane (IIA)",
    mnemonic:"ZONE = Z-ero to O-ne to t-w-o = N-ever E-rror in classification" },
  { id:"OISD-137", title:"Safety Instrumentation for Process Installations", category:"Instrumentation & Control", color:"#2EC4B6", icon:"🎛️", severity:"High",
    description:"Defines requirements for safety instrumented systems (SIS) in oil & gas process plants.",
    keyPoints:["Safety Integrity Level (SIL) classification for each safety function","SIS must be independent from Basic Process Control System (BPCS)","Emergency Shutdown (ESD) logic controller requirements","Pressure Safety Valves (PSV) testing intervals defined","Trip system proof test: at least annually for SIL 2 functions"],
    application:"Distillation units, reactors, compressors, heat exchangers",
    hydrocarbon:"High-pressure hydrocarbon streams — reactor feed, distillate vapors",
    mnemonic:"SIS = S-afety I-ntegrity S-ystems — the brain of the refinery" },
  { id:"OISD-144", title:"Transportation of Petroleum by Pipelines", category:"Pipeline Safety", color:"#3A86FF", icon:"🔧", severity:"High",
    description:"Standards for safe design, construction, and operation of petroleum product pipelines.",
    keyPoints:["Minimum wall thickness as per pipeline pressure class","Cathodic protection mandatory for all buried pipelines","Sectionalizing valves: maximum 32 km apart on cross-country lines","Hydrostatic test: 1.5× design pressure held for 24 hours","Minimum cover: 1m depth for pipelines crossing roads"],
    application:"Cross-country pipelines, in-plant piping for all hydrocarbons",
    hydrocarbon:"Crude oil, refined products, natural gas liquids",
    mnemonic:"PIPE = P-rotection I-nstalled P-revents E-rosion" },
  { id:"OISD-119", title:"Handling of Toxic Chemicals", category:"Chemical Safety", color:"#8338EC", icon:"☣️", severity:"High",
    description:"Guidelines for safe handling, storage, and disposal of toxic chemicals used in refineries.",
    keyPoints:["H₂S: IDLH = 100 ppm, LEL = 4.3% — treat as immediately dangerous","Mandatory SCBA for entry into any area with H₂S >10 ppm","Caustic storage requires dyked area with neutralization pit","HF acid: specialized PPE + antidote (calcium gluconate) on-site","MSDS must be available at all storage and use points"],
    application:"Desulfurization units, alkylation units, chemical treatment areas",
    hydrocarbon:"Hydrocarbon-associated toxics — H₂S in sour crude, mercaptans",
    mnemonic:"TOXIC = T-reat O-n-site X-posure I-mmediately C-all emergency" },
  { id:"OISD-155", title:"Safety in Design of Cross-Country Pipelines", category:"Pipeline Safety", color:"#06D6A0", icon:"🗺️", severity:"Medium",
    description:"Specific safety requirements for cross-country petroleum product pipeline design.",
    keyPoints:["Right of Way (ROW): minimum 18m (12m each side for HVP products)","Pipeline markers every 200m and at all road/railway crossings","Automatic block valves on both sides of river crossings","PIG (pipeline inspection gauge) launching/receiving facilities required","Leak detection systems mandatory for pipelines longer than 50 km"],
    application:"Long-distance pipelines from refineries to depots/consumers",
    hydrocarbon:"All petroleum products in cross-country movement",
    mnemonic:"ROW = R-ight of W-ay — never compromised, never built over" },
  { id:"OISD-150", title:"Design & Safety for Cross-Country LPG Pipelines", category:"Pipeline Safety", color:"#FB8500", icon:"🚰", severity:"Critical",
    description:"Dedicated standard for high-vapor-pressure LPG pipeline safety design.",
    keyPoints:["Operating pressure kept above bubble point to prevent vaporization","Emergency shut-off valves every 10 km in populated/sensitive areas","Burial depth: minimum 1.2m for all LPG pipelines","Automatic leak detection with 1% inventory monitoring","No threading allowed — only butt welding for LPG pipelines"],
    application:"LPG pipelines from refineries to bottling plants",
    hydrocarbon:"LPG — Propane, Butane, Propylene",
    mnemonic:"LPG PIPE = Keep it L-iquid P-ressurized G-uarded always" },
  { id:"OISD-110", title:"Site Selection & Layout for Petroleum Installations", category:"Layout & Spacing", color:"#E9C46A", icon:"📐", severity:"Medium",
    description:"Covers site selection criteria and layout planning for new petroleum installations.",
    keyPoints:["Wind rose analysis mandatory for flare stack positioning","Minimum 500m from residential areas for major installations","Avoid flood plains, proximity to airports, and earthquake zones","Access roads: minimum 2 independent entry/exit points required","Prevailing wind direction governs fired heater placement"],
    application:"New refinery/depot site selection and master planning",
    hydrocarbon:"Applicable to all hydrocarbon storage and processing facilities",
    mnemonic:"SITE = S-election I-nfluences T-otal plant E-fficiency forever" },
  { id:"OISD-RP-199", title:"Management of Change in Oil & Gas", category:"Management Systems", color:"#457B9D", icon:"📋", severity:"Medium",
    description:"Recommended practice for managing process, equipment, and organizational changes safely.",
    keyPoints:["All changes categorized: Minor, Moderate, or Major","HAZOP/HAZID required for all major process changes","MOC form must include: description, risk assessment, multi-level approvals","Pre-startup safety review (PSSR) mandatory before commissioning","Temporary changes: maximum 3-month validity, then re-evaluated"],
    application:"All modifications to refinery process, equipment, or procedures",
    hydrocarbon:"Any change affecting hydrocarbon containment or processing integrity",
    mnemonic:"MOC = M-anage O-nly C-hanges that are reviewed and approved" },
  { id:"OISD-GDN-192", title:"Safe Handling of Hydrogen in Refineries", category:"Chemical Safety", color:"#9B5DE5", icon:"⚗️", severity:"Critical",
    description:"Guidelines for safe production, storage, and use of hydrogen in modern refineries.",
    keyPoints:["H₂ flammability range: 4%–75% (widest of all refinery gases)","Auto-ignition temperature: 500°C — but static electricity can ignite it","Hydrogen embrittlement: special material selection required (HIC-resistant steels)","High-pressure H₂ storage follows ASME B31.3 process piping code","H₂ detectors installed at ceiling/roof level — hydrogen rises rapidly"],
    application:"Hydrocracker, hydrotreater, catalytic reformer units",
    hydrocarbon:"Hydrogen — critical utility in all modern refineries",
    mnemonic:"H2 = H-ighly explosive — 2× more careful handling needed always" },
];

const CAT_COLORS = {
  "Layout & Spacing":"#FF6B35","Fire Protection":"#E63946","Hazardous Area":"#FFD60A",
  "Instrumentation & Control":"#2EC4B6","Pipeline Safety":"#3A86FF",
  "Chemical Safety":"#8338EC","Management Systems":"#457B9D"
};
const CATEGORIES = [...new Set(OISDS.map(o=>o.category))];

let currentFilter = "All";
let currentView = "cards";
let quizState = { index:0, score:0, answer:null, done:false, questions:[] };

// ===== INIT =====
function init() {
  buildFilters();
  buildCards();
  buildMindmap();
  buildFlashcards();
  buildStats();
  buildQuiz();
}

function buildFilters() {
  const bar = document.getElementById('filter-bar');
  const barFc = document.getElementById('filter-bar-fc');
  const btns = ['All', ...CATEGORIES].map(cat => {
    const c = CAT_COLORS[cat] || '#FF6B35';
    return `<button class="filter-btn ${cat==='All'?'active':''}" 
      style="border-color:${cat==='All'?c:'var(--border)'};color:${cat==='All'?c:'var(--muted)'};background:${cat==='All'?c+'22':'transparent'}"
      onclick="setFilter('${cat}',this)">${cat}</button>`;
  }).join('');
  bar.innerHTML = btns;
  barFc.innerHTML = btns.replace(/onclick="setFilter\(/g, "onclick=\"setFilterFc(");
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('#filter-bar .filter-btn').forEach(b=>{
    const c = CAT_COLORS[b.textContent] || '#FF6B35';
    b.classList.remove('active');
    b.style.borderColor = 'var(--border)';
    b.style.color = 'var(--muted)';
    b.style.background = 'transparent';
  });
  const c = CAT_COLORS[cat] || '#FF6B35';
  btn.classList.add('active');
  btn.style.borderColor = c;
  btn.style.color = c;
  btn.style.background = c+'22';
  buildCards();
}

function setFilterFc(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('#filter-bar-fc .filter-btn').forEach(b=>{
    b.classList.remove('active');
    b.style.borderColor='var(--border)';b.style.color='var(--muted)';b.style.background='transparent';
  });
  const c = CAT_COLORS[cat] || '#FF6B35';
  btn.classList.add('active');
  btn.style.borderColor=c; btn.style.color=c; btn.style.background=c+'22';
  buildFlashcards();
}

function filtered() {
  return currentFilter==='All' ? OISDS : OISDS.filter(o=>o.category===currentFilter);
}

// ===== CARDS =====
function buildCards() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = filtered().map(o => `
    <div class="card" onclick="showDetail('${o.id}')"
      style="border-color:${o.color}33"
      onmouseover="this.style.borderColor='${o.color}';this.style.boxShadow='0 8px 32px ${o.color}33'"
      onmouseout="this.style.borderColor='${o.color}33';this.style.boxShadow='none'">
      <div class="card-top">
        <span class="card-icon">${o.icon}</span>
        <div>
          <div class="card-id" style="background:${o.color}22;color:${o.color}">${o.id}</div>
          <div class="card-cat">${o.category}</div>
        </div>
        <span class="card-badge" style="background:${o.severity==='Critical'?'#E6394622':o.severity==='High'?'#FFD60A22':'#06D6A022'};color:${o.severity==='Critical'?'#E63946':o.severity==='High'?'#FFD60A':'#06D6A0'}">${o.severity}</span>
      </div>
      <div class="card-title">${o.title}</div>
      <div class="card-desc">${o.description}</div>
      <div class="card-hc" style="color:${o.color}">🛢️ ${o.hydrocarbon.split(' — ')[0]}</div>
    </div>`).join('');
}

function showDetail(id) {
  const o = OISDS.find(x=>x.id===id);
  document.getElementById('cards-grid').style.display = 'none';
  document.getElementById('detail-panel').style.display = 'block';
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-card" style="background:linear-gradient(135deg,#0d1117,#0f1420);border:2px solid ${o.color}55;box-shadow:0 0 60px ${o.color}22">
      <div class="detail-header">
        <span class="detail-icon">${o.icon}</span>
        <div>
          <div class="card-id" style="background:${o.color}22;color:${o.color};font-size:14px;padding:4px 16px">${o.id}</div>
          <div class="detail-title">${o.title}</div>
          <div class="detail-cat">${o.category}</div>
        </div>
      </div>
      <div class="detail-desc" style="background:${o.color}11;border:1px solid ${o.color}33">${o.description}</div>
      <div class="detail-section-title" style="color:${o.color}">📋 Key Requirements</div>
      <div class="kp-list">${o.keyPoints.map((kp,i)=>`
        <div class="kp-item">
          <span class="kp-num" style="color:${o.color}">${i+1}.</span>
          <span class="kp-text">${kp}</span>
        </div>`).join('')}
      </div>
      <div class="detail-grid">
        <div class="detail-box">
          <div class="detail-box-label">Application</div>
          <div class="detail-box-val">${o.application}</div>
        </div>
        <div class="detail-box">
          <div class="detail-box-label">Hydrocarbons Covered</div>
          <div class="detail-box-val" style="color:${o.color};font-weight:600">${o.hydrocarbon}</div>
        </div>
      </div>
      <div class="mnemonic-box">
        <div class="mnemonic-label">💡 Memory Trick</div>
        <div class="mnemonic-text">${o.mnemonic}</div>
      </div>
    </div>`;
}

function closeDetail() {
  document.getElementById('cards-grid').style.display = 'grid';
  document.getElementById('detail-panel').style.display = 'none';
}

// ===== MINDMAP =====
function buildMindmap() {
  const container = document.getElementById('mindmap-content');
  container.innerHTML = CATEGORIES.map(cat => {
    const c = CAT_COLORS[cat];
    const items = OISDS.filter(o=>o.category===cat);
    return `<div class="mindmap-category">
      <div class="mindmap-cat-header">
        <div class="mindmap-dot" style="background:${c}"></div>
        <div class="mindmap-cat-title" style="color:${c}">${cat}</div>
        <div class="mindmap-line" style="background:${c}33"></div>
      </div>
      <div class="mindmap-items">
        ${items.map(o=>`
          <div class="mindmap-item" style="background:${c}11;border-color:${c}44"
            onmouseover="this.style.background='${c}22'"
            onmouseout="this.style.background='${c}11'"
            onclick="showView('cards');showDetail('${o.id}')">
            <div class="mindmap-item-top">
              <span style="font-size:18px">${o.icon}</span>
              <span class="mindmap-item-id" style="color:${c}">${o.id}</span>
            </div>
            <div class="mindmap-item-title">${o.title}</div>
            <div class="mindmap-item-hc">${o.hydrocarbon.split(' — ')[0]}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ===== FLASHCARDS =====
function buildFlashcards() {
  const grid = document.getElementById('flashcards-grid');
  grid.innerHTML = filtered().map(o=>`
    <div class="flashcard-wrapper" id="fc-${o.id}" onclick="this.classList.toggle('flipped')">
      <div class="flashcard-inner">
        <div class="flashcard-front" style="background:linear-gradient(135deg,${o.color}22,#0d1117);border:2px solid ${o.color}55">
          <span class="fc-icon">${o.icon}</span>
          <div class="fc-id" style="color:${o.color}">${o.id}</div>
          <div class="fc-hint">Click to reveal →</div>
        </div>
        <div class="flashcard-back" style="background:#0d1117;border:2px solid ${o.color}">
          <div class="fc-title" style="color:${o.color}">${o.title}</div>
          <div class="fc-desc">${o.description}</div>
          <div class="fc-mnemonic" style="color:var(--gold)">${o.mnemonic}</div>
        </div>
      </div>
    </div>`).join('');
}

// ===== QUIZ =====
function buildQuiz() {
  quizState.questions = OISDS.map(o => {
    const wrong = OISDS.filter(x=>x.id!==o.id).sort(()=>.5-Math.random()).slice(0,3).map(x=>x.id);
    const opts = [o.id, ...wrong].sort(()=>.5-Math.random());
    return { q:`Which OISD standard covers: "${o.description}"?`, correct:o.id, options:opts };
  }).sort(()=>.5-Math.random());
  quizState.index = 0; quizState.score = 0; quizState.answer = null; quizState.done = false;
  renderQuiz();
}

function renderQuiz() {
  const c = document.getElementById('quiz-container');
  if(quizState.done) {
    const pct = quizState.score / quizState.questions.length;
    c.innerHTML = `<div class="quiz-result">
      <div class="quiz-result-icon">${pct>=.8?'🏆':pct>=.5?'👍':'📚'}</div>
      <div class="quiz-result-title">Quiz Complete!</div>
      <div class="quiz-result-score">Score: <strong style="color:var(--accent)">${quizState.score}</strong> / ${quizState.questions.length}</div>
      <div class="quiz-result-msg">${pct>=.8?'🌟 Excellent! You are an OISD expert!':pct>=.5?'Good knowledge! Review the weak areas using Flashcards.':'Keep studying. Use Flashcards & Mind Map to review!'}</div>
      <button class="quiz-retry" onclick="buildQuiz()">Try Again 🔄</button>
    </div>`;
    return;
  }
  const q = quizState.questions[quizState.index];
  c.innerHTML = `
    <div class="quiz-meta">
      <span style="color:var(--muted)">Question ${quizState.index+1} of ${quizState.questions.length}</span>
      <span style="color:var(--gold);font-weight:700">Score: ${quizState.score}</span>
    </div>
    <div class="quiz-q">${q.q}</div>
    <div class="quiz-options">
      ${q.options.map(opt=>`
        <button class="quiz-opt" id="qopt-${opt}" onclick="answerQuiz('${opt}')">${opt} — ${OISDS.find(o=>o.id===opt).title}</button>
      `).join('')}
    </div>
    <button class="quiz-next" id="quiz-next-btn" onclick="nextQuestion()">
      ${quizState.index+1>=quizState.questions.length?'See Results 🏆':'Next Question →'}
    </button>`;
}

function answerQuiz(answer) {
  if(quizState.answer) return;
  quizState.answer = answer;
  const q = quizState.questions[quizState.index];
  if(answer===q.correct) quizState.score++;
  document.querySelectorAll('.quiz-opt').forEach(b=>{ b.disabled=true; });
  document.getElementById('qopt-'+q.correct).classList.add('correct');
  if(answer!==q.correct) document.getElementById('qopt-'+answer).classList.add('wrong');
  document.getElementById('quiz-next-btn').style.display='block';
}

function nextQuestion() {
  quizState.index++;
  quizState.answer = null;
  if(quizState.index>=quizState.questions.length) quizState.done=true;
  renderQuiz();
}

// ===== STATS =====
function buildStats() {
  const critical = OISDS.filter(o=>o.severity==='Critical').length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-box" style="background:rgba(58,134,255,.1);border:1px solid rgba(58,134,255,.3)">
      <div class="stat-num" style="color:#3A86FF">${OISDS.length}</div>
      <div class="stat-label">Total OISD Standards</div>
    </div>
    <div class="stat-box" style="background:rgba(230,57,70,.1);border:1px solid rgba(230,57,70,.3)">
      <div class="stat-num" style="color:#E63946">${critical}</div>
      <div class="stat-label">Critical Standards</div>
    </div>
    <div class="stat-box" style="background:rgba(6,214,160,.1);border:1px solid rgba(6,214,160,.3)">
      <div class="stat-num" style="color:#06D6A0">${CATEGORIES.length}</div>
      <div class="stat-label">Categories Covered</div>
    </div>`;
}

// ===== VIEW SWITCHING =====
function showView(view) {
  currentView = view;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('visible');
  const idx = ['cards','mindmap','flashcard','quiz'].indexOf(view);
  document.querySelectorAll('.nav-btn')[idx]?.classList.add('active');
  if(view==='cards') { closeDetail(); buildCards(); }
}

init();
</script>
</body>
</html>
